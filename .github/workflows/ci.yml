name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Run lint
        run: tox -e lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Run basedpyright
        run: tox -e type

  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.resolution }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        resolution: ["highest", "lowest"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Run tests
        run: |
          PY=$(echo "${{ matrix.python-version }}" | tr -d '.')
          tox -e py${PY}-${{ matrix.resolution }}

      - name: Prepare coverage report
        if: matrix.python-version == '3.11' && matrix.resolution == 'highest'
        run: |
          # If pytest-cov didn't produce coverage.xml in the project root,
          # regenerate it from the .coverage data file
          if [ ! -f coverage.xml ] && [ -f .coverage ]; then
            echo "::warning::coverage.xml not found, regenerating from .coverage data"
            tox exec -e py311-highest -- python -m coverage xml -o coverage.xml
          fi

      - name: Upload coverage to Codecov
        # Upload once from a single canonical matrix leg to avoid duplicate reports
        if: matrix.python-version == '3.11' && matrix.resolution == 'highest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  no-extras-smoke:
    name: No-extras smoke (mlflow optional)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          python-version: "3.11"

      - name: Install ragpill without any extras
        run: |
          uv venv .venv-noextras --python 3.11
          uv pip install --python .venv-noextras . pytest pytest-pretty 'anyio[trio]'

      - name: Confirm MLflow is not installed
        run: |
          .venv-noextras/bin/python -c "import importlib.util; assert importlib.util.find_spec('mlflow') is None, 'MLflow should NOT be installed in the no-extras job'"

      - name: Importing ragpill must not touch mlflow
        run: |
          .venv-noextras/bin/python -c "import ragpill; from ragpill.backends import SpanKind, Assessment, configure_backend, get_backend, reset_backend; print('ok')"

      - name: get_backend without configuration must raise a clear error
        run: |
          .venv-noextras/bin/python -c "
          from ragpill.backends import get_backend, reset_backend
          reset_backend()
          try:
              get_backend()
          except RuntimeError as e:
              assert 'ragpill[mlflow]' in str(e), f'unexpected: {e}'
              print('ok:', e)
          else:
              raise SystemExit('expected RuntimeError when MLflow is not installed')
          "

      - name: Configuring a custom backend must work
        run: |
          .venv-noextras/bin/python -c "
          from unittest.mock import MagicMock
          from ragpill.backends import Backend, configure_backend, get_backend, reset_backend
          reset_backend()
          fake = MagicMock(spec=Backend)
          configure_backend(lambda: fake)
          assert get_backend() is fake
          print('ok')
          "

  mlflow-integration:
    name: MLflow Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          prune-cache: false

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Start MLflow tracking server
        run: |
          uv run mlflow server --host 127.0.0.1 --port 5000 --backend-store-uri sqlite:///mlflow.db &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5000/health && break
            sleep 1
          done

      - name: Run MLflow integration tests
        env:
          RUN_MLFLOW_INTEGRATION_TESTS: "1"
          EVAL_MLFLOW_TRACKING_URI: "http://127.0.0.1:5000"
        run: tox -e py311-highest -- tests/test_mlflow_integration.py
