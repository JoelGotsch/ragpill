name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Run lint
        run: tox -e lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Run basedpyright
        run: tox -e type

  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.resolution }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        resolution: ["highest", "lowest"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Run tests
        run: |
          PY=$(echo "${{ matrix.python-version }}" | tr -d '.')
          tox -e py${PY}-${{ matrix.resolution }}

      - name: Upload coverage to Codecov
        # Upload once from a single canonical matrix leg to avoid duplicate reports
        if: matrix.python-version == '3.11' && matrix.resolution == 'highest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
