name: Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install mkdocs-material mkdocstrings-python jupyter
      - name: Convert notebooks to markdown
        run: |
          jupyter nbconvert --to markdown docs/how-to/custom-evaluator.ipynb
          jupyter nbconvert --to markdown docs/how-to/custom-type-evaluator.ipynb
          jupyter nbconvert --to markdown docs/tutorials/full.ipynb
      - run: mkdocs build --clean
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
