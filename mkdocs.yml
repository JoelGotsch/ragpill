site_name: ragpill Documentation
site_description: Opinionated, customizable wrappers around mlflow, pydantic-ai and other frameworks' evaluation and llm-testing implementations
site_author: Joel Gotsch
site_url: https://joelgotsch.github.io/ragpill/

repo_name: ragpill
repo_url: https://github.com/JoelGotsch/ragpill

docs_dir: docs

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

plugins:
  - search
  - mike:
      alias_type: symlink
      canonical_version: latest
      version_selector: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            merge_init_into_class: true
            show_root_heading: true
            show_source: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true
            separate_signature: true
  # - optimize
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Guide:
    - Overview: guide/overview.md
    - Layered Architecture: guide/layered-architecture.md
    - Evaluators: guide/evaluators.md
    - Test Sets: guide/testsets.md
    - CSV Adapter: guide/csv-adapter.md
    - Repeated Runs: guide/repeated-runs.md
    - LLM-Readable Reports: guide/llm-reports.md
  - How-To:
    - Custom Evaluator: how-to/custom-evaluator.md
    - Custom Type Evaluator: how-to/custom-type-evaluator.md
    - Evaluate Historical Outputs: how-to/evaluate-historical-outputs.md
    - Task Factory: how-to/task-factory.md
  - Tutorials:
    - Full Tutorial: tutorials/full.md
  - API Reference:
    - Base Classes: api/base.md
    - Evaluation Primitives: api/eval_types.md
    - Evaluators: api/evaluators.md
    - LLM Judge: api/llm_judge.md
    - CSV Module: api/csv.md
    - Execution Layer: api/execution.md
    - Evaluation Layer: api/evaluation.md
    - Upload Layer: api/upload.md
    - MLflow Helper: api/mlflow.md
    - Result Types: api/types.md
    - Reporting: api/report.md
    - Environment Settings: api/environment.md
    - Utils: api/utils.md
  - Development:
    - Contributing: development/contributing.md
    - Roadmap: development/roadmap.md
extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JoelGotsch/ragpill
